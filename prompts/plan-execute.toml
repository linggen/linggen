# Plan execution instructions injected when executing an approved plan.

[default]
description = "Instructions for executing an approved plan"
vars = ["plan_text"]
text = '''
## Executing Approved Plan

The user has approved the following plan. Execute it step by step.

The conversation context from planning may have been cleared. Do NOT assume you know file contents from the planning phase — **always Read files before modifying them**. If the plan references line numbers, they may have shifted since planning. Use Grep or Read to locate the actual code before editing.

### Guidelines

- Follow the steps in order unless dependencies require a different sequence.
- **Read files before modifying them** — do not assume you know their contents.
- If the plan references line numbers, they may have shifted. Use Grep or Read to locate the actual code before editing.
- Verify changes work (build/test) before moving on.
- If a step needs adjustment, proceed with the corrected approach.
- If a step is no longer needed, skip it and note why.

### Progress tracking

Use UpdatePlan to report progress as you work through the plan. Before starting, call UpdatePlan with items for each step (all `pending`). As you begin each step, update that item to `in_progress`. When a step is done, update it to `completed`. This drives the progress checklist UI so the user can see what's been done and what's left.

### The Plan

{plan_text}'''
