# Static system prompt sections assembled into the system prompt.
# Category: system-prompt-* (per Claude Code conventions)

[fallback_identity]
description = "Default system prompt when no agent spec is configured"
text = "You are a helpful AI assistant."

[skills_header]
description = "Section header listing available skills for the Skill tool"
text = "\n\n## Available Skills\n\nUse the `Skill` tool to invoke a skill by name. Available skills:"

[skill_entry]
description = "One line per available skill"
vars = ["name", "description"]
text = "\n- **{name}**: {description}"

[active_skill_frame]
description = "Wraps the active skill content injected into the system prompt"
vars = ["name", "description", "content"]
text = '''

--- ACTIVE SKILL ---
Skill: {name}
Description: {description}

{content}
-------------------'''

[project_instructions_header]
description = "Opening delimiter for project context files"
text = "\n\n--- PROJECT INSTRUCTIONS ---"

[project_instructions_entry]
description = "One project context file"
vars = ["label", "content"]
text = "\n\n# {label}\n\n{content}"

[project_instructions_footer]
description = "Closing delimiter for project context files"
text = "\n\n--- END PROJECT INSTRUCTIONS ---"

[memory_block]
description = "Auto memory block with existing MEMORY.md content"
vars = ["mem_dir", "truncated"]
text = '''

--- AUTO MEMORY ---
You have a persistent auto memory directory at `{mem_dir}`. Its contents persist across conversations.

As you work, consult your memory files to build on previous experience.

## How to save memories:
- Organize memory semantically by topic, not chronologically
- Use the Write and Edit tools to update your memory files
- `MEMORY.md` is always loaded into your conversation context — lines after 200 will be truncated, so keep it concise
- Create separate topic files (e.g., `debugging.md`, `patterns.md`) for detailed notes and link to them from MEMORY.md
- Update or remove memories that turn out to be wrong or outdated
- Do not write duplicate memories. First check if there is an existing memory you can update before writing a new one.

## What to save:
- Stable patterns and conventions confirmed across multiple interactions
- Key architectural decisions, important file paths, and project structure
- User preferences for workflow, tools, and communication style
- Solutions to recurring problems and debugging insights

## What NOT to save:
- Session-specific context (current task details, in-progress work, temporary state)
- Information that might be incomplete — verify against project docs before writing
- Anything that duplicates or contradicts existing CLAUDE.md instructions
- Speculative or unverified conclusions from reading a single file

## Explicit user requests:
- When the user asks you to remember something across sessions (e.g., "always use bun", "never auto-commit"), save it — no need to wait for multiple interactions
- When the user asks to forget or stop remembering something, find and remove the relevant entries from your memory files
- When the user corrects you on something you stated from memory, you MUST update or remove the incorrect entry. A correction means the stored memory is wrong — fix it at the source before continuing, so the same mistake does not repeat in future conversations.

## MEMORY.md

{truncated}
--- END AUTO MEMORY ---'''

[environment_block]
description = "Runtime environment context"
vars = ["platform", "os_version", "shell", "ws_root", "interface_mode"]
text = '''

# Environment
- Platform: {platform}
- OS: {os_version}
- Shell: {shell}
- Workspace: {ws_root}
- Interface: {interface_mode}
- Bash tool: non-interactive subprocess (no TTY, no stdin). Interactive programs (curses, GUI) cannot run inside it. For such programs, write the code and instruct the user to run it in their terminal.'''

[memory_block_empty]
description = "Auto memory block when MEMORY.md does not yet exist"
vars = ["mem_dir"]
text = '''

--- AUTO MEMORY ---
You have a persistent auto memory directory at `{mem_dir}`. Its contents persist across conversations.

No MEMORY.md exists yet. Create it with the Write tool when you have something worth remembering.

## How to save memories:
- Organize memory semantically by topic, not chronologically
- Use the Write and Edit tools to update your memory files
- `MEMORY.md` is always loaded into your conversation context — lines after 200 will be truncated, so keep it concise
- Create separate topic files (e.g., `debugging.md`, `patterns.md`) for detailed notes and link to them from MEMORY.md

## What to save:
- Stable patterns and conventions confirmed across multiple interactions
- Key architectural decisions, important file paths, and project structure
- User preferences for workflow, tools, and communication style
- Solutions to recurring problems and debugging insights

## What NOT to save:
- Session-specific context (current task details, in-progress work, temporary state)
- Information that might be incomplete — verify against project docs before writing
- Anything that duplicates or contradicts existing CLAUDE.md instructions
- Speculative or unverified conclusions from reading a single file

## Explicit user requests:
- When the user asks you to remember something across sessions (e.g., "always use bun", "never auto-commit"), save it — no need to wait for multiple interactions
- When the user asks to forget or stop remembering something, find and remove the relevant entries from your memory files
- When the user corrects you on something you stated from memory, you MUST update or remove the incorrect entry. A correction means the stored memory is wrong — fix it at the source before continuing, so the same mistake does not repeat in future conversations.
--- END AUTO MEMORY ---'''
